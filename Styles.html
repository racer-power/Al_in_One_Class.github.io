<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --pink-light: #ffe4ec;
    --pink: #ffb3c6;
    --pink-dark: #ff8fab;
    --sky-light: #d4f1f9;
    --sky: #a8dff5;
    --sky-dark: #7ec8e3;
    --lavender: #e8dff5;
    --cream: #fff9f0;
    --text: #4a4a6a;
    --text-light: #8888aa;
    --white: #ffffff;
    --shadow: rgba(180, 160, 200, 0.25);
    --radius: 20px;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'Gaegu', cursive, sans-serif;
    background: linear-gradient(135deg, var(--pink-light) 0%, var(--sky-light) 50%, var(--lavender) 100%);
    min-height: 100vh;
    color: var(--text);
    font-size: 18px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ─── 화면 전환 ─── */
  .screen {
    display: none;
    min-height: 100vh;
    padding: 24px 16px 40px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity var(--transition), transform var(--transition);
  }

  .screen.active {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    opacity: 1;
    transform: translateY(0);
  }

  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ─── 카드 ─── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: 0 8px 32px var(--shadow);
    margin-bottom: 16px;
    transition: transform var(--transition), box-shadow var(--transition);
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px var(--shadow);
  }

  /* ─── 로그인 ─── */
  .login-card {
    width: 100%;
    max-width: 400px;
    margin-top: 10vh;
    text-align: center;
  }

  .logo-area { margin-bottom: 28px; }

  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    animation: pulse 2s ease-in-out infinite;
  }

  .login-card h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--pink-dark);
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--text-light);
    font-size: 1rem;
  }

  .input-group {
    text-align: left;
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--sky-dark);
  }

  input[type="text"],
  textarea {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--sky);
    border-radius: 14px;
    font-family: 'Gaegu', cursive, sans-serif;
    font-size: 1.1rem;
    color: var(--text);
    background: var(--cream);
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }

  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 4px rgba(255, 179, 198, 0.3);
  }

  textarea { resize: vertical; min-height: 100px; }

  /* ─── 버튼 ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px 32px;
    border: none;
    border-radius: 50px;
    font-family: 'Gaegu', cursive, sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    width: 100%;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-dark) 100%);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(255, 143, 171, 0.4);
  }

  .btn-primary:hover {
    box-shadow: 0 6px 24px rgba(255, 143, 171, 0.55);
    transform: translateY(-2px);
  }

  .btn-checkout {
    background: linear-gradient(135deg, var(--sky) 0%, var(--sky-dark) 100%);
    color: var(--white);
    box-shadow: 0 4px 16px rgba(126, 200, 227, 0.4);
  }

  .btn-checkout:hover {
    box-shadow: 0 6px 24px rgba(126, 200, 227, 0.55);
    transform: translateY(-2px);
  }

  .btn-secondary {
    background: var(--lavender);
    color: var(--text);
    box-shadow: none;
  }

  .btn-sm {
    width: auto;
    padding: 8px 20px;
    font-size: 1rem;
    margin-top: 8px;
  }

  .btn-icon {
    background: var(--sky-light);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background var(--transition), transform 0.2s;
    color: var(--sky-dark);
    font-family: 'Gaegu', cursive, sans-serif;
  }

  .btn-icon:hover {
    background: var(--sky);
    transform: scale(1.1);
  }

  .btn-close {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-light);
    transition: color 0.2s, transform 0.2s;
    padding: 4px 8px;
  }

  .btn-close:hover {
    color: var(--pink-dark);
    transform: rotate(90deg);
  }

  /* ─── 에러 / 완료 메시지 ─── */
  .error-msg {
    color: #e05a7a;
    font-weight: 700;
    margin-top: 12px;
    font-size: 1rem;
    animation: fadeIn 0.3s ease;
  }

  .complete-msg {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--sky-dark);
    padding: 12px 0;
    animation: fadeIn 0.5s ease;
  }

  .complete-msg span { font-size: 1.6rem; }

  /* ─── 메인 ─── */
  .main-container {
    width: 100%;
    max-width: 480px;
  }

  .welcome-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .welcome-header h2 {
    font-size: 1.8rem;
    color: var(--pink-dark);
    margin-bottom: 6px;
  }

  .student-badge {
    display: inline-block;
    background: var(--sky-light);
    color: var(--sky-dark);
    padding: 4px 16px;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: 700;
  }

  .card-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--pink-dark);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .notice-text {
    background: var(--cream);
    padding: 14px 18px;
    border-radius: 14px;
    border-left: 4px solid var(--pink);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ─── 달력 ─── */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .calendar-header h3 {
    font-size: 1.3rem;
    color: var(--sky-dark);
  }

  .calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 8px;
    font-size: 0.9rem;
  }

  .calendar-weekdays span:first-child { color: #f08080; }
  .calendar-weekdays span:last-child  { color: var(--sky-dark); }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: 0.95rem;
    transition: background var(--transition);
    position: relative;
  }

  .cal-day.empty { visibility: hidden; }

  .cal-day.today {
    background: var(--pink-light);
    font-weight: 700;
    color: var(--pink-dark);
    border: 2px solid var(--pink);
  }

  .cal-day.attended .stamp {
    font-size: 0.75rem;
    line-height: 1;
  }

  .calendar-legend {
    text-align: center;
    margin-top: 12px;
    font-size: 0.9rem;
    color: var(--text-light);
  }

  /* ─── 모달 ─── */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal.hidden { display: none; }

  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(100, 80, 120, 0.35);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
  }

  .modal-content {
    position: relative;
    background: var(--white);
    border-radius: var(--radius);
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px var(--shadow);
    z-index: 1;
  }

  .slide-up { animation: slideUp 0.4s ease forwards; }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 0;
  }

  .modal-header h3 {
    font-size: 1.3rem;
    color: var(--pink-dark);
  }

  .modal-body {
    padding: 16px 24px;
  }

  .modal-body label {
    display: block;
    font-weight: 700;
    color: var(--sky-dark);
    margin-bottom: 8px;
    margin-top: 12px;
  }

  .modal-body label:first-child { margin-top: 0; }

  .modal-footer {
    padding: 0 24px 24px;
  }

  .signature-wrapper {
    background: var(--cream);
    border: 2px dashed var(--sky);
    border-radius: 14px;
    padding: 8px;
    text-align: center;
  }

  #signatureCanvas {
    width: 100%;
    height: 180px;
    border-radius: 10px;
    background: var(--white);
    cursor: crosshair;
    touch-action: none;
  }

  /* ─── 로딩 ─── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(255, 244, 248, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    transition: opacity 0.3s ease;
  }

  .loading-overlay.hidden {
    display: none;
  }

  .loading-box {
    text-align: center;
    animation: fadeIn 0.3s ease;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid var(--pink-light);
    border-top-color: var(--pink-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  .loading-box p {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--pink-dark);
  }

  /* ─── 토스트 ─── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--white);
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 700;
    z-index: 3000;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.hidden { display: none; }

  .hidden { display: none !important; }

  @media (max-width: 400px) {
    body { font-size: 16px; }
    .login-card h1 { font-size: 1.6rem; }
    .welcome-header h2 { font-size: 1.5rem; }
  }
</style>
